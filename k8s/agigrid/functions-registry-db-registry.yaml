apiVersion: apps/v1
kind: Deployment
metadata:
  name: functions-registry-db-registry
  namespace: registries
spec:
  replicas: 1
  selector:
    matchLabels:
      app: functions-registry-db-registry
  template:
    metadata:
      labels:
        app: functions-registry-db-registry
    spec:
      containers:
        - name: functions-registry-db-registry
          image: aiosv1/functions-registry-db-registry:v1
          ports:
            - containerPort: 4000
          env:
            - name: MONGO_URL
              value: "mongodb://registry-0.registries.svc.cluster.local:27017"
---
apiVersion: v1
kind: Service
metadata:
  name: functions-registry-db-registry-svc
  namespace: registries
spec:
  selector:
    app: functions-registry-db-registry
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30214
  type: NodePort
